<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Full Screen Double Tap Gallery</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
            touch-action: manipulation; /* Membantu performa tap di mobile */
        }

        #gallery-container {
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            transition: transform 0.5s ease-in-out;
        }

        .slide {
            height: 100vh;
            width: 100%;
            flex-shrink: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            pointer-events: none;
        }

        #instruction {
            position: fixed;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            z-index: 10;
            font-size: 14px;
            pointer-events: none;
        }
    </style>
</head>
<body onclick="handleInteraction()">

    <div id="gallery-container">
        <div class="slide"><img src="1.png"></div>
        <div class="slide"><img src="2.png"></div>
        <div class="slide"><img src="3.png"></div>
        <div class="slide"><img src="4.png"></div>
        <div class="slide"><img src="5.png"></div>
        <div class="slide"><img src="6.png"></div>
    </div>

    <div id="instruction">Ketuk 1x untuk Full Screen, Ketuk 2x untuk Lanjut</div>

    <script>
        let currentSlide = 0;
        const totalSlides = 6;
        let lastTap = 0;
        const container = document.getElementById('gallery-container');
        const instruction = document.getElementById('instruction');

        function handleInteraction() {
            const now = new Date().getTime();
            const timesince = now - lastTap;

            // 1. Pemicu Full Screen pada interaksi pertama apa pun
            enableFullScreen();

            // 2. Deteksi Double Tap untuk ganti gambar
            if ((timesince < 300) && (timesince > 0)) {
                nextSlide();
            }
            lastTap = now;
        }

        function enableFullScreen() {
            const docElm = document.documentElement;
            if (docElm.requestFullscreen) {
                docElm.requestFullscreen();
            } else if (docElm.mozRequestFullScreen) { /* Firefox */
                docElm.mozRequestFullScreen();
            } else if (docElm.webkitRequestFullScreen) { /* Chrome, Safari, Opera */
                docElm.webkitRequestFullScreen();
            } else if (docElm.msRequestFullscreen) { /* IE/Edge */
                docElm.msRequestFullscreen();
            }
        }

        function nextSlide() {
            if (currentSlide < totalSlides - 1) {
                currentSlide++;
                container.style.transform = `translateY(-${currentSlide * 100}vh)`;
            } else {
                // Reset ke awal jika sudah di gambar terakhir
                currentSlide = 0;
                container.style.transform = `translateY(0)`;
            }
            
            // Update teks instruksi
            if (currentSlide > 0) {
                instruction.innerHTML = `Gambar ${currentSlide + 1} / ${totalSlides}`;
            }
        }

        // Mencegah zoom default browser saat double tap
        document.addEventListener('touchstart', function(event) {
            if (event.touches.length > 1) {
                event.preventDefault();
            }
        }, { passive: false });
    </script>
</body>
</html>
