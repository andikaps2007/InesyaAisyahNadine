<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery Vertical Swipe</title>
    <style>
        /* Menghilangkan margin bawaan dan membuat layar penuh */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #121212; /* Warna latar gelap agar gambar lebih stand out */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Container utama: Mengaktifkan Scroll Snapping vertikal */
        .snap-container {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
        }

        /* Setiap section gambar */
        .slide {
            height: 100vh;
            width: 100%;
            scroll-snap-align: start;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Mengatur gambar agar proporsional dan tidak terpotong */
        img {
            max-width: 95%;
            max-height: 90%;
            object-fit: contain;
            user-select: none;
            -webkit-user-drag: none;
        }

        /* Overlay instruksi */
        .hint {
            position: absolute;
            bottom: 40px;
            color: rgba(255, 255, 255, 0.8);
            text-align: center;
            width: 100%;
            pointer-events: none;
            animation: moveUp 2s infinite;
        }

        @keyframes moveUp {
            0%, 100% { transform: translateY(0); opacity: 0.5; }
            50% { transform: translateY(-15px); opacity: 1; }
        }

        /* Navigasi simpel di pojok kanan (opsional untuk desktop) */
        .indicator {
            position: fixed;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 10;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
        }
    </style>
</head>
<body>

<div class="snap-container">
    <section class="slide">
        <img src="1.png" alt="Gambar 1">
        <div class="hint">
            <p>Swipe ke atas ☝️</p>
        </div>
    </section>

    <section class="slide">
        <img src="2.png" alt="Gambar 2">
    </section>

    <section class="slide">
        <img src="3.png" alt="Gambar 3">
    </section>

    <section class="slide">
        <img src="4.png" alt="Gambar 4">
    </section>

    <section class="slide">
        <img src="5.png" alt="Gambar 5">
    </section>

    <section class="slide">
        <img src="6.png" alt="Gambar 6">
        <div class="hint" style="animation: none; opacity: 0.6;">
            <p>Halaman Terakhir</p>
        </div>
    </section>
</div>

<div class="indicator">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
</div>

</body>
</html>
